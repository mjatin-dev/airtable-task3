<div class="p-6 bg-white h-[80vh] rounded-lg shadow-lg">
  <div class="mt-3 flex justify-between items-center mb-10">
    <h2 class="text-xl font-bold text-stone-800">Row Details</h2>
    <button mat-button class="text-blue-500" (click)="close()">X</button>
  </div>
  <div *ngFor="let key of objectKeys(data)" class="flex w-full gap-3 mb-3">
    <div *ngIf="!isObject(data[key])" class="w-20 text-[12px] text-stone-600">
      {{ key }}:
    </div>
    <div
      *ngIf="!isObject(data[key])"
      class="w-full border-[1px] py-1 px-2 text-stone-700 rounded-lg"
    >
      {{ data[key] }}
    </div>
    <!-- <div *ngIf="isObject(data[key])">
      <h4>{{ key }} (Nested Fields):</h4>
      <div *ngFor="let nestedKey of objectKeys(data[key])">
        <strong>{{ nestedKey }}:</strong> {{ data[key][nestedKey] }}
      </div>
    </div> -->
  </div>
</div>
