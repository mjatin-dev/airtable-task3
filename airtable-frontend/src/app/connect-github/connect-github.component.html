<div class="min-h-screen flex flex-col items-center justify-center bg-white">
  <div class="bg-black w-screen h-16 flex items-center justify-between">
    <div
      class="max-w-6xl flex text-white items-center justify-between w-full mx-auto"
    >
      <h1 class="text-3xl font-bold">SREDIO</h1>
      <p>Logged in as - {{ userName }}</p>
    </div>
  </div>
  <div class="container h-screen w-full mx-auto max-w-6xl py-10">
    <mat-accordion>
      <app-loader [loading]="isLoading"></app-loader>
      <mat-expansion-panel
        (opened)="panelOpenState.set(true)"
        (closed)="panelOpenState.set(false)"
      >
        <mat-expansion-panel-header>
          <mat-panel-title>
            <div class="flex gap-2 items-center">
              <img
                src="assets/githubIcon.png"
                alt="GitHub"
                class="w-6 h-6 mr-2"
              />
              <span class="font-medium">GitHub</span>
              <div class="text-green-500 flex items-center" *ngIf="isConnected">
                <mat-icon class="mr-1">check_circle</mat-icon>
              </div>
              <div class="flex items-center" *ngIf="isConnected">
                <mat-icon class="mr-1">access_time</mat-icon>
              </div>
            </div>
          </mat-panel-title>
          <mat-panel-description
            class="w-full flex flex-col justify-end p-2 items-end"
            *ngIf="isConnected"
          >
            <p class="m-0 text-[14px] self-end text-stone-400">
              {{ userName }}: Last Synced:
              {{ connectedAt | date : "YYYY-MM-dd HH:mm:ss a" }}
            </p>
            <p class="m-0 text-[14px] self-end text-stone-400">
              Sync Type: full
            </p>
          </mat-panel-description>
        </mat-expansion-panel-header>
        <div
          class="flex gap-3 justify-between items-center pb-3"
          *ngIf="!isConnected"
        >
          <p class="font-bold text-lg text-black">Connect Sredio to Github</p>
          <button
            class="bg-black text-white px-4 py-2 rounded hover:bg-black/30"
            (click)="connectToGitHub()"
          >
            Connect
          </button>
        </div>
        <div
          class="flex gap-3 items-center pt-5 justify-between pb-3"
          *ngIf="isConnected"
        >
          <div class="flex items-center gap-3">
            <a
              class="bg-black text-white px-4 py-2 rounded hover:bg-black/30"
              href="/integrations"
              >Dashboard</a
            >
            <a
              class="bg-black text-white hover:bg-black/30 px-4 py-2 rounded"
              href="/repo"
              >Repository</a
            >
          </div>
          <button
            class="bg-black text-white px-4 py-2 rounded hover:bg-black/30"
            (click)="removeIntegration()"
          >
            <div class="flex items-center gap-2">
              <span class="flex items-center">Remove</span>
              <img
                src="assets/incognitoIcon.png"
                alt="Incognito Icon"
                class="w-auto h-4 invert"
              />
            </div>
          </button>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</div>
